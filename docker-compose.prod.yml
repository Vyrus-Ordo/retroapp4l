networks:
  infra-network:
    external: true  # Declarada e gerenciada pelo /opt/infra/docker-compose.yml

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    volumes:
      # Bind mount: backend escreve staticfiles direto no host
      # Nginx lê do mesmo path via seu próprio bind mount
      - /opt/retroapp4l/staticfiles:/app/staticfiles
    networks:
      - infra-network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: worker
    restart: unless-stopped
    env_file:
      - ./backend/.env.prod
    networks:
      - infra-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_TURNSTILE_SITE_KEY: ${NUXT_PUBLIC_TURNSTILE_SITE_KEY}
    container_name: frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: https://retroapp4l.privo.app.br/api
      NUXT_PUBLIC_WS_BASE: wss://retroapp4l.privo.app.br/ws
      HOST: 0.0.0.0
      PORT: "3000"
    networks:
      - infra-network